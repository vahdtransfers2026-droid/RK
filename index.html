<!DOCTYPE html>
<html>
<head>
    <title>Employee Data Collection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0fdfa;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            background: teal;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>

    <script>
        function handleSubmit(form) {
            setTimeout(() => {
                form.reset();
                alert("Data submitted successfully!");
            }, 500);
        }
    </script>
</head>

<body>

<div class="container">
    <h2>Employee Data Collection</h2>

    <form method="POST"
          action="https://script.google.com/macros/s/AKfycbwLq1mQwU_6MNB8N3MqTCfd2wAfHPV0wnNZOP68ux5x-j_uM0UM7Bckk0VU3pN6giS3/exec"
          target="hidden_iframe"
          onsubmit="handleSubmit(this)">

        <label>Emp ID</label>
        <input type="text" name="emp_id" required>

        <label>Employee Name</label>
        <input type="text" name="employee_name" required>

        <label>Gender</label>
        <select name="gender" required>
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>Date of Birth</label>
        <input type="date" name="dob" required>

        <label>Designation</label>
        <select name="designation">
            <option value="">Select</option>
            <option>AD(A)</option>
            <option>AD(B)</option>
            <option>Driver(LV)</option>
            <option>Jr.Asst</option>
            <option>Sr.Asst</option>
        </select>

        <label>Institution Type</label>
        <select name="inst_type">
            <option value="">Select</option>
            <option>ADDL</option>
            <option>AVH</option>
            <option>Directorate</option>
        </select>

        <label>Institution Place</label>
        <input type="text" name="inst_place">

        <label>District</label>
        <select name="inst_dist" required>
            <option value="">Select</option>
            <option>Hyderabad</option>
            <option>Warangal</option>
            <option>Nizamabad</option>
        </select>

        <label>Present Station Date</label>
        <input type="date" name="present_station" required>

        <label>Mobile Number</label>
        <input type="tel" name="mobile"
               pattern="[6-9][0-9]{9}"
               maxlength="10"
               required>

        <button type="submit">Submit</button>

    </form>

    <!-- Hidden iframe to prevent redirect -->
    <iframe name="hidden_iframe" style="display:none;"></iframe>

</div>

</body>
</html>
